<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>antsim2</title>
    <style>
      :root {
        --bg: #0d0d0f;
        --panel: #16161a;
        --panel-2: #1e1e24;
        --line: #2a2a32;
        --text: #d8d8e0;
        --dim: #8a8a96;
        --accent: #6fb4ff;
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font: 13px/1.45 ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
        overflow: hidden;
      }

      #app { display: flex; height: 100vh; }

      .rail {
        width: 240px;
        flex: 0 0 240px;
        background: var(--panel);
        border-right: 1px solid var(--line);
        overflow-y: auto;
        padding: 12px;
      }
      .rail.right { border-right: none; border-left: 1px solid var(--line); width: 300px; flex-basis: 300px; }
      .rail.collapsed { display: none; }

      #world-wrap { flex: 1; position: relative; min-width: 0; }
      #world { display: block; width: 100%; height: 100%; cursor: crosshair; }
      #world.panning { cursor: grabbing; }

      .overlay {
        position: absolute; top: 8px; left: 8px;
        background: rgba(0,0,0,0.55);
        padding: 4px 8px; border-radius: 4px;
        color: var(--dim); pointer-events: none;
        font-size: 12px;
      }
      .hotkeys {
        position: absolute; left: 8px; bottom: 8px;
        background: rgba(0,0,0,0.55); color: var(--dim);
        padding: 3px 8px; border-radius: 4px; font-size: 11px;
        pointer-events: none;
      }
      .collapse {
        position: absolute; top: 8px; background: rgba(0,0,0,0.55);
        border: 1px solid var(--line); color: var(--dim);
        border-radius: 4px; cursor: pointer; padding: 2px 7px;
      }
      #collapse-left { left: 8px; top: 34px; }
      #collapse-right { right: 8px; }

      h2 {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em;
        color: var(--dim); margin: 16px 0 8px; font-weight: 600;
      }
      h2:first-child { margin-top: 0; }

      button {
        background: var(--panel-2); color: var(--text);
        border: 1px solid var(--line); border-radius: 4px;
        padding: 5px 9px; cursor: pointer; font: inherit;
      }
      button:hover { border-color: var(--accent); }
      button.on { background: var(--accent); color: #06121f; border-color: var(--accent); }

      .row { display: flex; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
      .row > button { flex: 1; }

      label.check { display: flex; align-items: center; gap: 7px; padding: 3px 0; cursor: pointer; }

      .slider { margin-bottom: 9px; }
      .slider .head { display: flex; justify-content: space-between; color: var(--dim); font-size: 11px; }
      .section-toggle {
        display: block; width: 100%; text-align: left; background: none; border: none;
        cursor: pointer; padding: 0; margin: 16px 0 8px;
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em;
        color: var(--dim); font-weight: 600;
      }
      .section-toggle:hover { color: var(--text); }
      .tuning-body.collapsed { display: none; }
      .slider .head b { color: var(--text); font-weight: 500; }
      .slider input { width: 100%; margin: 2px 0 0; accent-color: var(--accent); }

      .colony { border: 1px solid var(--line); border-radius: 5px; padding: 8px; margin-bottom: 8px; background: var(--panel-2); }
      .colony.clickable { cursor: pointer; }
      .colony.clickable:hover { border-color: var(--accent); }
      .colony .title { display: flex; align-items: center; gap: 7px; font-weight: 600; margin-bottom: 5px; }
      .swatch { width: 11px; height: 11px; border-radius: 2px; flex: 0 0 11px; }
      .swatch-glyph { width: 13px; height: 13px; flex: 0 0 13px; }
      .kv { display: grid; grid-template-columns: 1fr auto; font-size: 12px; color: var(--dim); }
      .kv b { color: var(--text); font-weight: 500; }
      .colony canvas { width: 100%; height: 40px; display: block; margin-top: 6px; }

      .chronicle { display: flex; flex-direction: column; gap: 3px; max-height: 220px; overflow-y: auto; margin-bottom: 8px; }
      .chron-row { display: flex; gap: 6px; align-items: baseline; font-size: 12px; padding: 2px 6px; background: var(--panel-2); border-radius: 3px; }
      .chron-tick { color: var(--dim); font-variant-numeric: tabular-nums; flex: 0 0 auto; }
      .chron-text { color: var(--text); }
      .chron-empty { color: var(--dim); font-size: 12px; font-style: italic; }

      .ctx-menu { position: fixed; z-index: 1000; min-width: 160px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 4px; box-shadow: 0 6px 24px rgba(0,0,0,0.5); font-size: 13px; }
      .ctx-item { padding: 6px 10px; border-radius: 4px; cursor: pointer; color: var(--text); display: flex; gap: 6px; align-items: center; }
      .ctx-item:hover { background: rgba(255,255,255,0.07); }
      .ctx-input { flex: 1 1 auto; min-width: 0; background: #0a0a0c; border: 1px solid var(--line); border-radius: 3px; color: var(--text); padding: 3px 5px; font-size: 12px; }
      .ctx-apply { flex: 0 0 auto; background: var(--accent, #4a7); border: none; border-radius: 3px; color: #000; padding: 3px 8px; cursor: pointer; font-size: 12px; }

      .labels { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
      .map-label { position: absolute; display: flex; align-items: center; gap: 4px; transform: translate(-50%, -50%); white-space: nowrap; font-size: 12px; color: #fff; text-shadow: 0 1px 3px #000, 0 0 4px #000; padding: 1px 4px; background: rgba(0,0,0,0.35); border-radius: 4px; }
      .map-label-glyph { width: 12px; height: 12px; }

      /* In-world colony popover: sits above the nest it names and points down
         at it. Non-interactive so map clicks pass through to the canvas. */
      .colony-popover { position: absolute; transform: translate(-50%, calc(-100% - 12px)); min-width: 132px; background: rgba(12,12,15,0.94); border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px; font-size: 12px; color: var(--text); pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.55); z-index: 5; }
      .colony-popover .title { display: flex; align-items: center; gap: 6px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; }
      .colony-popover::after { content: ""; position: absolute; left: 50%; bottom: -6px; transform: translateX(-50%); border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid var(--line); }

      #inspector .kv { margin-bottom: 2px; }
      #nn { width: 100%; height: 260px; display: block; background: #0a0a0c; border: 1px solid var(--line); border-radius: 5px; margin-top: 8px; }
      .muted { color: var(--dim); }
      .status { font-size: 11px; color: var(--dim); margin-top: 10px; }
      .status.bad { color: #ff7a6b; }
      .bar { height: 5px; background: #000; border-radius: 3px; overflow: hidden; margin: 3px 0 6px; }
      .bar > div { height: 100%; background: var(--accent); }

      .tip { position: relative; cursor: help; border-bottom: 1px dotted var(--dim); }
      .tip:hover::after {
        content: attr(data-tip);
        position: absolute; left: 0; top: 140%; z-index: 20;
        width: max-content; max-width: 220px;
        background: #06070a; color: var(--text);
        border: 1px solid var(--line); border-radius: 5px;
        padding: 5px 7px; font-size: 11px; line-height: 1.35;
        box-shadow: 0 6px 18px rgba(0,0,0,0.6); white-space: normal;
        pointer-events: none;
      }

      .tabstrip { display: flex; gap: 4px; margin-bottom: 10px; }
      .tab { flex: 1; }
      .tabpane { min-width: 0; }

      /* Stats tab: stacked time-series charts. */
      .stats-legend { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-bottom: 10px; }
      .stats-legend-item { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--dim); }
      .stats-legend-swatch { width: 16px; height: 16px; display: block; }
      .stats-legend-line { display: inline-block; width: 14px; height: 2px; border-radius: 1px; }
      .stats-chart { margin-bottom: 12px; cursor: pointer; }
      .stats-chart:hover .stats-chart-title { color: var(--accent); }
      .stats-chart-title { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
      .stats-canvas { width: 100%; height: 84px; display: block; border-radius: 3px; }

      /* Expanded interactive graph (uPlot in a modal). */
      .graph-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 50;
        display: flex; align-items: center; justify-content: center; }
      .graph-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
        width: min(1100px, 92vw); height: min(760px, 88vh); display: flex; flex-direction: column;
        padding: 14px 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
      .graph-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
      .graph-metrics { display: flex; flex-wrap: wrap; gap: 5px; }
      .graph-metric-btn { font-size: 11px; padding: 3px 8px; background: var(--panel-2); color: var(--dim);
        border: 1px solid var(--line); border-radius: 4px; cursor: pointer; }
      .graph-metric-btn.on { background: var(--accent); color: #06121f; border-color: var(--accent); font-weight: 600; }
      .graph-actions { display: flex; gap: 6px; flex-shrink: 0; }
      .graph-actions button { font-size: 11px; padding: 3px 8px; background: var(--panel-2); color: var(--text);
        border: 1px solid var(--line); border-radius: 4px; cursor: pointer; }
      .graph-note { color: var(--dim); font-size: 11px; margin: 8px 0 6px; }
      .graph-plot { flex: 1; min-height: 0; position: relative; }
      /* uPlot theming to match the dark UI. */
      .graph-plot .u-title, .graph-plot .u-legend { color: var(--text); }
      .graph-plot .u-axis { color: var(--dim); }
      /* Cursor value tooltip: a floating box positioned relative to .graph-plot. */
      .graph-tip {
        position: absolute; z-index: 5; pointer-events: none;
        background: rgba(20, 22, 28, 0.95); border: 1px solid rgba(255,255,255,0.15);
        border-radius: 6px; padding: 6px 8px; font-size: 12px; color: #dfe3ea;
        white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      }
      .graph-tip-x { font-weight: 600; margin-bottom: 3px; color: #9aa; }
      .graph-tip-row { display: flex; align-items: center; gap: 5px; }
      .graph-tip-swatch { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }

      .fitness { display: flex; justify-content: space-between; align-items: baseline; margin-top: 4px; }
      .fitness b { font-size: 16px; color: var(--accent); }
      .fitness-brk { font-size: 11px; margin-bottom: 8px; }
      .explorer-chart { width: 100%; height: 60px; display: block; margin-top: 8px; }
      .explainer { margin-top: 12px; }
      .explainer summary { cursor: pointer; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; }
      .explainer p { color: var(--dim); font-size: 12px; line-height: 1.5; margin: 8px 0 0; }
      .caption { color: var(--dim); font-size: 11px; margin: 2px 0 6px; }

      /* Whisker input grid: 5 directions x 6 channels, tinted by activation. */
      .whisker-grid { display: grid; grid-template-columns: auto repeat(7, 1fr); gap: 2px; margin: 4px 0 10px; font-size: 10px; }
      .whisker-grid > div { text-align: center; padding: 2px 1px; border-radius: 2px; overflow: hidden; }
      .wg-head { color: var(--dim); font-weight: 500; }
      .wg-dir { color: var(--dim); text-align: right; padding-right: 5px; white-space: nowrap; }
      .wg-val { color: var(--text); font-variant-numeric: tabular-nums; }

      /* Floating readout for a hovered network node. */
      .nn-pop { position: fixed; z-index: 40; pointer-events: none; max-width: 220px;
        background: #06070a; border: 1px solid var(--line); border-radius: 5px;
        padding: 6px 8px; box-shadow: 0 6px 18px rgba(0,0,0,0.6); }
      .nn-pop-name { color: var(--text); font-size: 12px; font-weight: 600; }
      .nn-pop-val { color: var(--accent); font-size: 12px; font-variant-numeric: tabular-nums; }
      .nn-pop-desc { color: var(--dim); font-size: 11px; line-height: 1.35; margin-top: 3px; }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="rail left" id="left-rail"></aside>
      <div id="world-wrap">
        <canvas id="world"></canvas>
        <div class="overlay" id="overlay">connecting…</div>
        <div class="hotkeys" id="hotkeys">Alt-click: tile · F: fit · Space: pause · Esc: deselect</div>
        <button class="collapse" id="collapse-left" title="Toggle left rail">&#9668;</button>
        <button class="collapse" id="collapse-right" title="Toggle right rail">&#9658;</button>
      </div>
      <aside class="rail right" id="right-rail"></aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
